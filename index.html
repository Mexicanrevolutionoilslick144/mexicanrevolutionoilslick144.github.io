<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Кликер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        --bg: var(--tg-theme-bg-color, #1c1c1e);
        --text: var(--tg-theme-text-color, #ffffff);
        --btn: var(--tg-theme-button-color, #ff9f0a);
        --btn-text: var(--tg-theme-button-text-color, #000000);
        --secondary: var(--tg-theme-secondary-bg-color, #2c2c30);
        --border: var(--tg-theme-hint-color, #555555);
        --accent: #ff9f0a;
        --success: #4caf50;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
        padding: 20px;
        box-sizing: border-box;
      }
      .stats-panel {
        width: 100%;
        max-width: 360px;
        background: var(--secondary);
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 24px;
        border: 1px solid var(--border);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .stat-item {
        text-align: center;
      }
      .stat-label {
        font-size: 12px;
        color: #aaaaaa;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .stat-value {
        font-weight: bold;
        font-size: 20px;
        color: var(--accent);
      }
      #score {
        font-size: 64px;
        font-weight: 700;
        line-height: 1;
        margin-bottom: 8px;
      }
      .label {
        color: #aaaaaa;
        font-size: 14px;
        margin-bottom: 24px;
        text-align: center;
      }
      button#clickBtn {
        width: 220px;
        height: 220px;
        border-radius: 50%;
        border: none;
        background-color: var(--btn);
        color: var(--btn-text);
        font-size: 28px;
        cursor: pointer;
        box-shadow: 0 12px 32px rgba(0,0,0,0.35);
        user-select: none;
        transition: transform 0.08s, box-shadow 0.2s;
        position: relative;
        overflow: hidden;
      }
      button#clickBtn:active {
        transform: scale(0.94);
      }
      /* Пульсация для автоклика */
      .autopulse {
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.4); }
        70% { box-shadow: 0 0 0 12px rgba(76, 175, 80, 0); }
        100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
      }
      .shop-container {
        width: 100%;
        max-width: 360px;
        background: var(--secondary);
        border-radius: 16px;
        padding: 16px;
        border: 1px solid var(--border);
      }
      .shop-title {
        margin: 0 0 16px 0;
        font-size: 18px;
        text-align: center;
      }
      .upgrade-btn {
        width: 100%;
        background: transparent;
        border: 1px solid var(--border);
        color: white;
        padding: 12px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 15px;
        margin-bottom: 10px;
        text-align: left;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .upgrade-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        border-color: #333;
      }
      .upgrade-price {
        color: var(--accent);
        font-weight: bold;
      }
      /* Эффект всплывающих цифр при клике */
      .float-number {
        position: absolute;
        pointer-events: none;
        font-weight: bold;
        color: var(--accent);
        font-size: 24px;
        animation: floatUp 1s forwards;
      }
      @keyframes floatUp {
        0% { opacity: 1; transform: translateY(0) scale(1); }
        100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
      }
    </style>
  </head>
  <body>
    <!-- Статистика -->
    <div class="stats-panel">
      <div class="stat-item">
        <div class="stat-label">Сила клика</div>
        <div class="stat-value" id="statPower">1</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Авто/сек</div>

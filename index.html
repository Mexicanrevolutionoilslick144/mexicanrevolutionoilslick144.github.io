<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Кликер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        --bg: var(--tg-theme-bg-color, #1c1c1e);
        --text: var(--tg-theme-text-color, #ffffff);
        --btn: var(--tg-theme-button-color, #ff9f0a);
        --btn-text: var(--tg-theme-button-text-color, #000000);
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
      }
      #score {
        font-size: 64px;
        font-weight: bold;
        margin-bottom: 30px;
      }
      button#clickBtn {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        border: none;
        background-color: var(--btn);
        color: var(--btn-text);
        font-size: 28px;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        user-select: none;
      }
      button#clickBtn:active {
        transform: scale(0.96);
      }
      .label { color: #aaaaaa; margin-top: 12px; }
    </style>
  </head>
  <body>
    <div id="score">0</div>
    <button id="clickBtn">КЛИК</button>
    <div class="label">Монет: <span id="coins">0</span></div>

    <script>
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand(); // развернуть на весь экран

      let coins = parseInt(localStorage.getItem('clicker_coins')) || 0;
      const scoreEl = document.getElementById('score');
      const coinsEl = document.getElementById('coins');
      const btn = document.getElementById('clickBtn');

      function save() {
        localStorage.setItem('clicker_coins', coins);
        // Можно отправлять прогресс боту:
        // tg.sendData(String(coins));
      }

      function updateUI() {
        scoreEl.textContent = coins;
        coinsEl.textContent = coins;
      }

      updateUI();

      btn.addEventListener('click', () => {
        coins++;
        updateUI();
        save();
      });
    </script>
  </body>
</html>
